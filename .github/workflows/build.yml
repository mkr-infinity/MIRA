name: Build MIRA Desktop Apps

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 (deb + AppImage)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_glob: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            artifact_name: mira-linux-x86_64
          # Linux ARM64 (deb)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_glob: |
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            artifact_name: mira-linux-aarch64
          # Linux x86 (i686)
          - target: i686-unknown-linux-gnu
            os: ubuntu-22.04
            artifact_glob: |
              src-tauri/target/i686-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/i686-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            artifact_name: mira-linux-x86
          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_glob: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: mira-windows-x86_64
          # Windows x86
          - target: i686-pc-windows-msvc
            os: windows-latest
            artifact_glob: |
              src-tauri/target/i686-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: mira-windows-x86
          # Windows ARM64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact_glob: |
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: mira-windows-aarch64
          # macOS x64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_glob: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
            artifact_name: mira-macos-x86_64
          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_glob: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            artifact_name: mira-macos-aarch64
          # macOS universal (Intel + Apple Silicon)
          - target: universal-apple-darwin
            os: macos-latest
            artifact_glob: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            artifact_name: mira-macos-universal

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libdbus-1-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-
            cargo-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Generate source icons
        run: node scripts/make-source-icon.js

      - name: Generate full icon set
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build (universal)
        if: matrix.target == 'universal-apple-darwin'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          npm run tauri:build -- --target universal-apple-darwin

      - name: Build
        if: matrix.target != 'universal-apple-darwin'
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
